x-agent-base: &agent-base
  build:
    context: .
  env_file:
    - .env
  volumes:
    - ./data:/app/data
    - ./config:/app/config
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  gmail-agent:
    <<: *agent-base
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}

  gmail-agent-postgres:
    <<: *agent-base
    profiles:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MEMORY_BACKEND: postgres
      DATABASE_URL: postgresql://gmail_agent:gmail_agent@postgres:5432/gmail_agent
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: gmail_agent
      POSTGRES_USER: gmail_agent
      POSTGRES_PASSWORD: gmail_agent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmail_agent -d gmail_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
