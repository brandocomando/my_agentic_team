name: Gmail Inbox Agent Release

on:
  push:
    branches:
      - main
    paths:
      - "gmail-inbox-agent/**"
      - ".github/workflows/gmail-inbox-agent-release.yml"
      - ".github/workflows/reusable-agent-release.yml"
  pull_request:
    paths:
      - "gmail-inbox-agent/**"
      - ".github/workflows/gmail-inbox-agent-release.yml"
      - ".github/workflows/reusable-agent-release.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: gmail-inbox-agent-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/reusable-agent-release.yml
    with:
      agent_dir: gmail-inbox-agent
      dockerfile: gmail-inbox-agent/Dockerfile
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
      image_description: Local Gmail inbox triage agent
      image_name: brandocomando8/gmail-inbox-agent
      image_title: Gmail Inbox Agent
      release_name: Gmail Inbox Agent
      release_tag_format: gmail-inbox-agent-v${version}
    secrets:
      docker_hub_pat: ${{ secrets.DOCKER_HUB_PAT }}
